<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ministerio del Amor | Medicina para el Alma</title>
    <style>
        :root {
            --ghibli-sky: #87a7b3;
            --ghibli-sand: #fcf9f2;
            --ghibli-earth: #d4a373;
            --ghibli-forest: #606c38;
            --text: #4a4a4a;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--ghibli-sand);
            color: var(--text);
            margin: 0;
            line-height: 1.6;
        }

        /* Hero Section & Logo */
        header {
            background: white;
            text-align: center;
            padding: 60px 20px;
            border-bottom: 5px solid var(--ghibli-earth);
        }

        .logo-container img {
            max-width: 220px;
            border-radius: 50%;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            margin-bottom: 20px;
            animation: float 5s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .frase-motivacional {
            font-style: italic;
            color: var(--ghibli-earth);
            max-width: 600px;
            margin: 20px auto;
            font-size: 1.2rem;
            padding: 0 15px;
        }

        /* Galería de Productos */
        .contenedor {
            max-width: 1100px;
            margin: 50px auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            padding: 0 20px;
        }

        .tarjeta {
            background: white;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
        }

        .tarjeta:hover {
            transform: scale(1.03);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }

        .img-prod {
            width: 100%;
            height: 280px;
            object-fit: cover;
            cursor: pointer;
            background-color: #eee;
        }

        .info {
            padding: 25px;
            text-align: center;
            flex-grow: 1;
        }

        .precio-original {
            text-decoration: line-through;
            color: #b5b5b5;
            font-size: 0.9rem;
        }

        .precio-actual {
            display: block;
            color: var(--ghibli-forest);
            font-weight: 700;
            font-size: 1.4rem;
            margin: 8px 0;
        }

        .btn-wa {
            display: inline-block;
            background: #25d366;
            color: white;
            padding: 12px 25px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-wa:hover { background: #128c7e; }

        /* Footer & Contacto */
        footer {
            background: white;
            text-align: center;
            padding: 60px 20px;
            margin-top: 60px;
            border-top: 1px solid #eee;
        }

        .redes {
            margin-top: 25px;
        }

        .fb-link {
            display: inline-block;
            background-color: #1877f2;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .fb-link:hover { opacity: 0.8; }

        /* Admin Oculto */
        #admin-trigger {
            position: fixed;
            bottom: 0;
            right: 0;
            width: 40px;
            height: 40px;
            z-index: 9999;
            cursor: default;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<header>
    <div class="logo-container">
        <!-- Ruta configurada según tu carpeta img/ -->
        <img src="img/logo.jpg" alt="Logo Ministerio del Amor">
    </div>
    <h1>Ministerio del Amor</h1>
    <p class="frase-motivacional">"La sanación es un camino de regreso al corazón, donde el amor es la única medicina."</p>
</header>

<div class="contenedor" id="tienda"></div>

<footer>
    <h2>Contáctanos</h2>
    <p>Estamos aquí para acompañar tu proceso de sanación.</p>
    <div class="redes">
        <p>Encuéntranos en nuestra comunidad de Facebook:</p>
        <a href="https://www.facebook.com/profile.php?id=61582251427724" class="fb-link" target="_blank">Visitar Ministerio del Amor</a>
    </div>
</footer>

<!-- Esquina invisible para modo admin (Código: 1234) -->
<div id="admin-trigger" onclick="activarAdmin()"></div>

<script>
    const NUMERO_WA = "524591201474";
    
    let productos = [
        { id: 1, nombre: "Salvia Blanca (30cm)", precio: "90", img: "img/Salvia30.jpg", desc: "Purificación ancestral." },
        { id: 2, nombre: "Palo Santo (40cm)", precio: "40", img: "img/palosanto.jpg", desc: "Armonía y paz para tu espacio." },
        { id: 3, nombre: "Proyector Largo Personalizado", precio: "300", img: "img/Tepi.jpg", desc: "Aplicador de Rapé artesanal de largo alcance." },
        { id: 4, nombre: "Proyector Individual", precio: "250", img: "img/Curipe.jpg", desc: "Aplicador personal (Kuripe) sagrado." },
        { id: 5, nombre: "Lectura de Tarot", precio: "200", img: "img/tarot.jpg", desc: "Claridad y guía mística." },
        { id: 6, nombre: "Salvia (12cm)", precio: "30", img: "img/Salvia10.jpg", desc: "Protección y limpieza diaria." },
        { id: 7, nombre: "Ceremonia de Cacao", precio: "Cooperación Amorosa", original: "250", img: "img/cacao.jpg", desc: "Medicina para abrir el corazón." },
        { id: 8, nombre: "Sanación de Cristales", precio: "Cooperación Amorosa", original: "200", img: "img/Cuarzo.jpg", desc: "Equilibrio y alineación energética." },
        { id: 9, nombre: "Brisa Áurica", precio: "80", img: "img/brisaaurica.jpg", desc: "Eleva tu frecuencia vibratoria." },
        { id: 10, nombre: "Bálsamo de Esencias", precio: "50", img: "img/balsamo.jpg", desc: "Relajación y bienestar natural." },
        { id: 11, nombre: "Rapé Nacional (g)", precio: "20", img: "img/rape.jpg", desc: "Medicina de tabaco molido por gramo." },
        { id: 12, nombre: "Rapé Brasileño (g)", precio: "30", img: "img/rape.jpg", desc: "Fuerza profunda de la selva por gramo." }
    ];

    function renderTienda() {
        const t = document.getElementById('tienda');
        t.innerHTML = '';
        productos.forEach(p => {
            const card = document.createElement('div');
            card.className = 'tarjeta';
            card.innerHTML = `
                <img src="${p.img}" class="img-prod" onclick="cambiarFoto(${p.id})">
                <div class="info">
                    <h3 contenteditable="false" onblur="guardarCambio(${p.id}, 'nombre', this)">${p.nombre}</h3>
                    <p contenteditable="false" onblur="guardarCambio(${p.id}, 'desc', this)">${p.desc}</p>
                    ${p.original ? `<span class="precio-original">$${p.original}</span>` : ''}
                    <span class="precio-actual" contenteditable="false" onblur="guardarCambio(${p.id}, 'precio', this)">
                        ${p.precio.includes('Coop') ? p.precio : '$' + p.precio}
                    </span>
                    <a href="https://wa.me/${NUMERO_WA}?text=Hola! Deseo informes sobre: ${p.nombre}" class="btn-wa" target="_blank">Adquirir Medicina</a>
                </div>
            `;
            t.appendChild(card);
        });
    }

    function activarAdmin() {
        if(prompt("Código de Acceso:") === "1234") {
            document.querySelectorAll('[contenteditable]').forEach(e => e.contentEditable = "true");
            alert("Modo Edición Activado: Puedes editar textos directamente y hacer clic en las imágenes para cambiar el archivo.");
        }
    }

    function guardarCambio(id, campo, el) {
        const p = productos.find(i => i.id === id);
        p[campo] = el.innerText.replace('$', '');
    }

    function cambiarFoto(id) {
        const p = productos.find(i => i.id === id);
        const nuevoNombre = prompt("Nombre del archivo dentro de /img (ejemplo: foto.jpg):", p.img.split('/').pop());
        if(nuevoNombre) {
            p.img = "img/" + nuevoNombre;
            renderTienda();
        }
    }

    renderTienda();
</script>

</body>
</html>
